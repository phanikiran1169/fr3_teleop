# fr3_teleop/config/servo_config.yaml
# MoveIt Servo configuration for FR3 keyboard teleoperation
moveit_servo:
  # Robot frames
  robot_link_command_frame: fr3_link0
  planning_frame: fr3_link0
  ee_frame_name: fr3_link8

  # MoveIt group (from SRDF)
  move_group_name: fr3_arm

  # Input: twist commands from teleop_twist_keyboard
  command_in_type: speed_units

  # Output: joint trajectory to fr3_arm_controller on RT PC
  command_out_topic: /fr3_arm_controller/joint_trajectory
  command_out_type: trajectory_msgs/JointTrajectory
  publish_joint_positions: true
  publish_joint_velocities: true
  publish_joint_accelerations: false
  publish_period: 0.034

  # Joint state feedback from RT PC
  joint_topic: /joint_states

  # Scaling (conservative for safety)
  linear_scale: 0.1
  rotational_scale: 0.1
  joint_scale: 0.1

  # Safety
  incoming_command_timeout: 0.5
  num_outgoing_halt_msgs_to_publish: 4
  override_velocity_scaling_factor: 0.0

  # Smoothing
  smoothing_filter_plugin_name: online_signal_smoothing::ButterworthFilterPlugin

  # Planning scene
  is_primary_planning_scene_monitor: true
  monitored_planning_scene_topic: /planning_scene
